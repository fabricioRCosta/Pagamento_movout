<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>App do Motorista</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Inter", sans-serif;
            background: #f5f6fa;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .1);
            max-width: 400px;
            margin: auto;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .start {
            background: #2ecc71;
            color: #fff;
        }

        .stop {
            background: #e74c3c;
            color: #fff;
        }

        .status {
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <h1>MOVOUT - Motorista</h1>

    <div class="card">
        <p><b>ID do motorista:</b> 1</p>
        <p><b>ID do frete:</b> 1</p>

        <button class="start" onclick="iniciar()">Iniciar corrida</button>
        <button class="stop" onclick="parar()">Parar</button>

        <div class="status" id="status">⏸ Parado</div>
    </div>

    <script>
        //const MOTORISTA_ID = 1;
        //const FRETE_ID = 1;


        const API_URL = "http://127.0.0.1:8000/api/v1";


        let watchId = null;

        function iniciar() {
            if (!navigator.geolocation) {
                alert("GPS não suportado");
                return;
            }

            document.getElementById("status").innerText = "📡 Enviando localização...";

            watchId = navigator.geolocation.watchPosition(
                enviarLocalizacao,
                erroGPS,
                {
                    enableHighAccuracy: true,
                    maximumAge: 1000,
                    timeout: 5000
                }
            );
        }

        function parar() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }

            document.getElementById("status").innerText = " Parado";
        }

        function enviarLocalizacao(position) {
            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            fetch(`${API_URL}/motoristas/${MOTORISTA_ID}/localizacao?latitude=${latitude}&longitude=${longitude}&frete_id=${FRETE_ID}`, {
                method: "PATCH"
            });

            document.getElementById("status").innerText =
                ` Lat: ${latitude.toFixed(5)} | Lng: ${longitude.toFixed(5)}`;
        }

        function erroGPS(error) {
            alert("Erro ao obter GPS: " + error.message);
        }
    </script>




    <script>
        const MOTORISTA_ID = localStorage.getItem("motorista_id") || 1;
        const FRETE_ID = localStorage.getItem("frete_id") || 1;
    </script>


</body>

</html>
